version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fashiondb
      POSTGRES_USER: fashion_user
      POSTGRES_PASSWORD: fashion_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - fashion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashion_user -d fashiondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_NAME: fashiondb
      DB_USER: fashion_user
      DB_PASSWORD: fashion_pass_2026
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  fashion_data:
