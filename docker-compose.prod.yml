# Production: web app only (uses Neon / external DATABASE_URL from .env)
services:
  web:
    build: .
    container_name: fashion-store
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
